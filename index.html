<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>云端情绪手账</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ========== 欢迎页 ========== -->
<div class="welcome-overlay" id="welcomeOverlay">
  <div class="welcome-clouds-bg"></div>
  <div class="welcome-content">
    <div class="welcome-cloud-icon">☁️</div>
    <h1 class="welcome-title" id="welcomeTitle"></h1>
    <p class="welcome-sub" id="welcomeSub"></p>
    <button class="btn welcome-btn" id="welcomeBtn">踏入云端</button>
  </div>
</div>

<!-- ========== 顶部导航栏 ========== -->
<nav class="top-nav" id="topNav">
  <div class="nav-brand">☁️ 云端手账</div>
  <div class="nav-links">
    <a class="nav-link active" data-page="home">首页</a>
    <a class="nav-link" data-page="write">写心情</a>
    <a class="nav-link" data-page="journal">我的手账</a>
    <a class="nav-link" data-page="favorites">收藏</a>
    <a class="nav-link" data-page="settings">设置</a>
  </div>
  <button class="nav-theme-toggle" id="themeToggle" title="切换主题">🌙</button>
</nav>

<!-- ========== 页面容器 ========== -->
<main class="main-container" id="mainContainer">

  <!-- ===== 首页 ===== -->
  <section class="page active" data-page="home">
    <!-- 今日心情卡 -->
    <div class="hero-card">
      <div class="hero-greeting">
        <h2 id="greetingText">你好呀 ☁️</h2>
        <p id="greetingSub">今天的心情是什么样的？</p>
      </div>
      <button class="btn hero-write-btn" onclick="switchPage('write')">✏️ 写下此刻心情</button>
    </div>

    <!-- 统计概览 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">篇手账</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-number" id="statStreak">0</div>
        <div class="stat-label">天连续</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💜</div>
        <div class="stat-number" id="statFav">0</div>
        <div class="stat-label">个收藏</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌈</div>
        <div class="stat-number" id="statMoods">0</div>
        <div class="stat-label">种情绪</div>
      </div>
    </div>

    <!-- 最近手账 -->
    <div class="section-header">
      <h3>最近手账</h3>
      <a class="section-more" data-page="journal">查看全部 →</a>
    </div>
    <div class="card-grid" id="recentJournals"></div>
    <div class="empty-state" id="homeEmpty" style="display:none;">
      <div class="empty-icon">☁️</div>
      <p>还没有手账，写下你的第一篇吧</p>
      <button class="btn" onclick="switchPage('write')">开始书写</button>
    </div>
  </section>

  <!-- ===== 写心情 ===== -->
  <section class="page" data-page="write">
    <div class="write-card">
      <h2>写下此刻心情 ✏️</h2>
      <div class="write-form">
        <input class="write-title-input" id="writeTitle" type="text" placeholder="给这篇手账起个标题（可选）" maxlength="30"/>
        <textarea class="write-textarea" id="writeContent" placeholder="今天的心情怎么样？把心事藏进云朵里…" maxlength="500"></textarea>
        <div class="write-footer">
          <span class="write-count"><span id="writeCharCount">0</span>/500</span>
        </div>
        <div class="mood-selector">
          <p class="mood-label">选择情绪标签：</p>
          <div class="mood-tags" id="moodTags"></div>
        </div>
        <div class="write-actions">
          <button class="btn btn-secondary" id="saveDraftBtn">存为草稿</button>
          <button class="btn btn-primary" id="publishBtn">☁️ 发布到云端</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 我的手账 ===== -->
  <section class="page" data-page="journal">
    <div class="section-header">
      <h2>我的手账 📖</h2>
    </div>
    <!-- 标签筛选 -->
    <div class="filter-bar" id="journalFilter">
      <button class="filter-tag active" data-filter="all">全部</button>
      <button class="filter-tag" data-filter="published">已发布</button>
      <button class="filter-tag" data-filter="draft">草稿</button>
    </div>
    <div class="card-grid" id="journalList"></div>
    <div class="empty-state" id="journalEmpty" style="display:none;">
      <div class="empty-icon">📝</div>
      <p>还没有手账</p>
    </div>
  </section>

  <!-- ===== 收藏 ===== -->
  <section class="page" data-page="favorites">
    <div class="section-header">
      <h2>我的收藏 💜</h2>
    </div>
    <div class="card-grid" id="favList"></div>
    <div class="empty-state" id="favEmpty" style="display:none;">
      <div class="empty-icon">💜</div>
      <p>还没有收藏</p>
    </div>
  </section>

  <!-- ===== 设置 ===== -->
  <section class="page" data-page="settings">
    <div class="settings-card">
      <h2>个人设置 ⚙️</h2>
      <div class="setting-item">
        <label class="setting-label">昵称</label>
        <div class="setting-row">
          <input class="setting-input" id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="12"/>
          <button class="btn btn-small" id="saveNicknameBtn">保存</button>
        </div>
      </div>
      <div class="setting-item">
        <label class="setting-label">主题模式</label>
        <div class="theme-options" id="themeOptions">
          <button class="theme-opt" data-theme="light">☀️ 白天</button>
          <button class="theme-opt" data-theme="night">🌙 夜晚</button>
        </div>
      </div>
      <div class="setting-item">
        <label class="setting-label">我的发布</label>
        <p class="setting-desc" id="myPublishCount">已发布 0 篇手账</p>
      </div>
      <div class="setting-item">
        <label class="setting-label">数据管理</label>
        <div class="setting-row">
          <button class="btn btn-secondary btn-small" id="exportBtn">导出数据</button>
          <button class="btn btn-danger btn-small" id="clearDataBtn">清空所有数据</button>
        </div>
      </div>
    </div>
  </section>

</main>

<!-- ========== 详情弹窗 ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
